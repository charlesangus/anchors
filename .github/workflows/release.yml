name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: pip install pytest

      - name: Run offline tests
        run: pytest tests/

      - name: Build release ZIP
        run: |
          mkdir anchors
          cp anchor.py anchors.py colors.py constants.py labels.py link.py \
             menu.py prefs.py tabtabtab.py util.py \
             README.md LICENSE \
             anchors/
          zip -r "anchors-${GITHUB_REF_NAME}.zip" anchors/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: anchors-${{ github.ref_name }}.zip
